<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1e3d"/>
      <stop offset="100%" stop-color="#071630"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#bg3)"/>

  <!-- factory -->
  <g transform="translate(160,260)" fill="#0f2a52" stroke="#5fe0d0" stroke-width="2">
    <rect x="0" y="60" width="320" height="180" rx="8"/>
    <path d="M0 60 L60 10 L120 60 Z"/>
    <path d="M120 60 L180 10 L240 60 Z"/>
    <rect x="30" y="120" width="50" height="70" fill="#17b8a6" stroke="none"/>
    <rect x="120" y="120" width="50" height="70" fill="#5fe0d0" stroke="none"/>
    <rect x="210" y="120" width="50" height="70" fill="#17b8a6" stroke="none"/>
  </g>
  <text x="160" y="490" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#dbe4f5">UK assembly plant</text>

  <!-- channel / trucks moving freely -->
  <g stroke="#5fe0d0" stroke-width="3" fill="none">
    <path d="M540 350 L1000 350"/>
  </g>
  <g transform="translate(640,320)" fill="#17b8a6">
    <rect x="0" y="0" width="70" height="40" rx="6"/>
    <circle cx="14" cy="42" r="10" fill="#0b1e3d" stroke="#5fe0d0" stroke-width="2"/>
    <circle cx="56" cy="42" r="10" fill="#0b1e3d" stroke="#5fe0d0" stroke-width="2"/>
  </g>
  <g transform="translate(820,320)" fill="#5fe0d0">
    <rect x="0" y="0" width="70" height="40" rx="6"/>
    <circle cx="14" cy="42" r="10" fill="#0b1e3d" stroke="#17b8a6" stroke-width="2"/>
    <circle cx="56" cy="42" r="10" fill="#0b1e3d" stroke="#17b8a6" stroke-width="2"/>
  </g>
  <text x="640" y="300" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#9db0d6">No border checks</text>

  <!-- EU side -->
  <g transform="translate(1080,260)" fill="#0f2a52" stroke="#5fe0d0" stroke-width="2">
    <rect x="0" y="60" width="320" height="180" rx="8"/>
    <rect x="30" y="120" width="50" height="70" fill="#5fe0d0" stroke="none"/>
    <rect x="120" y="120" width="50" height="70" fill="#17b8a6" stroke="none"/>
    <rect x="210" y="120" width="50" height="70" fill="#5fe0d0" stroke="none"/>
  </g>
  <text x="1080" y="490" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#dbe4f5">EU parts suppliers</text>

  <text x="160" y="620" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Just-in-time parts, zero paperwork, before 2021</text>
</svg>
