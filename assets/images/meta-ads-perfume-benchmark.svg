    <circle cx="0" cy="0" r="26"/>
    <path d="M-9 0 h18 M0 -9 v18"/>
  </g>
  <g transform="translate(1260,190)" fill="none" stroke="#17b8a6" stroke-width="3">
    <circle cx="0" cy="0" r="18"/>
    <path d="M-6 0 h12 M0 -6 v12"/>
  </g>

  <text x="180" y="640" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Meta Ads Benchmarking &#183; Perfume Category</text>
</svg>
